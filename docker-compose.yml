services:
  postgres:
    image: postgres:16-alpine
    container_name: baia-postgres
    environment:
      POSTGRES_USER: baia
      POSTGRES_PASSWORD: baia
      POSTGRES_DB: baia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
